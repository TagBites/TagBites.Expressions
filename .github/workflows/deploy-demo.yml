name: deploy demo

on:
  push:
    branches: [ master ]
    paths:
      - 'samples/**'
      - 'src/**'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push cancels an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish Blazor WASM demo
        run: dotnet publish samples/TagBites.Expressions.Demo/TagBites.Expressions.Demo.csproj -c Release -o publish

      # Project Pages are served from https://<user>.github.io/TagBites.Expressions/,
      # so the app base path must match the repository name.
      - name: Set base href
        run: sed -i 's|<base href="/" />|<base href="/TagBites.Expressions/" />|' publish/wwwroot/index.html

      # GitHub Pages ignores folders starting with '_' (like _framework) unless .nojekyll exists.
      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      # SPA fallback so deep links resolve to the app.
      - name: Add 404 fallback
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
